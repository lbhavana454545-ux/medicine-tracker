<!DOCTYPE html>
<html>
<head>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicines Tracker</title>

<style>
  body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    padding: 10px;
  }

  h1 { text-align: center; }

  .toggle {
    text-align: center;
    margin-bottom: 15px;
  }

  .toggle button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background: #ccc;
    font-size: 16px;
  }

  .active {
    background: #2ecc71 !important;
    color: white;
  }

  h2 { margin-top: 20px; }

  .section { margin-bottom: 15px; }

  .btn {
    width: 100%;
    padding: 18px;
    margin: 8px 0;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #9e9e9e;
    color: white;
  }

  .taken { background: #2ecc71; }

  .info {
    text-align: center;
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
  }

  .reset-btn {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border: none;
    border-radius: 12px;
    background: #e74c3c;
    color: white;
    font-size: 16px;
  }
</style>

<!-- Firebase config -->
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "medicine-tracker-9acc2.firebaseapp.com",
  databaseURL: "https://medicine-tracker-9acc2-default-rtdb.firebaseio.com",
  projectId: "medicine-tracker-9acc2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<h1>Medicines Tracker</h1>

<!-- ✅ MOVED HERE -->
<div class="toggle">
  <button onclick="switchUser('dad')" id="dadBtn">Dad</button>
  <button onclick="switchUser('mom')" id="momBtn">Mom</button>
</div>

<div class="info" id="statusText"></div>

<!-- MORNING -->
<div class="section">
  <h2>Morning</h2>

  <b>Before Food</b>
  <button class="btn" id="m1">Pan D</button>
  <button class="btn" id="m2">Zavetox</button>
  <button class="btn" id="m3">Fiasp Insulin</button>

  <b>After Food</b>
  <button class="btn" id="m4">Cilacar 10mg</button>
  <button class="btn" id="m5">Omnacortil 5mg</button>
  <button class="btn" id="m6">Nodosis 1g</button>
</div>

<!-- AFTERNOON -->
<div class="section">
  <h2>Afternoon</h2>

  <b>Before Food</b>
  <button class="btn" id="a1">Fiasp Insulin</button>

  <b>After Food</b>
  <button class="btn" id="a2">Calci-CZ</button>
  <button class="btn" id="a3">Silodal D8</button>
  <button class="btn" id="a4">Moxovas</button>
</div>

<!-- NIGHT -->
<div class="section">
  <h2>Night</h2>

  <b>Before Food</b>
  <button class="btn" id="n1">Fiasp Insulin</button>
  <button class="btn" id="n2">Zavetox</button>

  <b>After Food</b>
  <button class="btn" id="n3">Azoran 100mg</button>
  <button class="btn" id="n4">Cilacar 20mg</button>
  <button class="btn" id="n5">Ecosprin AV</button>
  <button class="btn" id="n6">Nodosis</button>
  <button class="btn" id="n7">Tresiba Insulin</button>
</div>

<button class="reset-btn" onclick="confirmReset()">Reset All</button>

<script>
let currentUser = "dad";

const meds = [
"m1","m2","m3","m4","m5","m6",
"a1","a2","a3","a4",
"n1","n2","n3","n4","n5","n6","n7"
];

function resetIfNeeded() {
  const today = new Date().toDateString();
  document.getElementById("statusText").innerText =
    "Tracking for: " + today;
}

function confirmReset() {
  if (confirm("Reset all medicines?")) {
    meds.forEach(id => {
      db.ref(currentUser + "/" + id).set(false);
    });
  }
}

function loadState() {
  meds.forEach(id => {
    const btn = document.getElementById(id);
    const ref = db.ref(currentUser + "/" + id);

    ref.off(); // ✅ prevent duplicate listeners

    ref.on("value", snapshot => {
      if (snapshot.val() === true) {
        btn.classList.add("taken");
      } else {
        btn.classList.remove("taken");
      }
    });

    btn.onclick = () => {
      ref.once("value").then(s => {
        ref.set(!s.val());
      });
    };
  });
}

function switchUser(user) {
  currentUser = user;

  document.getElementById("dadBtn").classList.remove("active");
  document.getElementById("momBtn").classList.remove("active");

  document.getElementById(user + "Btn").classList.add("active");

  loadState();
}

resetIfNeeded();
switchUser("dad");

</script>

</body>
</html>
