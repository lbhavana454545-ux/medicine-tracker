<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#f2f2f2;
  padding:10px;
}

h1 { text-align:center; }

.toggle {
  text-align:center;
  margin-bottom:15px;
}

.toggle button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ccc;
}

.active {
  background:#2ecc71 !important;
  color:white;
}

.btn {
  width:100%;
  padding:18px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#9e9e9e;
  color:white;
}

.taken {
  background:#2ecc71;
}

.reset-btn {
  width:100%;
  padding:14px;
  margin-top:25px;
  border:none;
  border-radius:12px;
  background:#e74c3c;
  color:white;
}
</style>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "medicine-tracker-9acc2.firebaseapp.com",
  databaseURL: "https://medicine-tracker-9acc2-default-rtdb.firebaseio.com",
  projectId: "medicine-tracker-9acc2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<h1 id="title">Medicines</h1>

<div class="toggle">
  <button onclick="switchUser('dad')" id="dadBtn">Dad</button>
  <button onclick="switchUser('mom')" id="momBtn">Mom</button>
</div>

<!-- ADD MEDICINE -->
<input id="medName" placeholder="Medicine name" style="width:100%;padding:10px;margin-bottom:8px;">

<select id="medTime" style="width:100%;padding:10px;margin-bottom:8px;">
  <option value="morning">Morning</option>
  <option value="afternoon">Afternoon</option>
  <option value="night">Night</option>
</select>

<select id="medType" style="width:100%;padding:10px;margin-bottom:8px;">
  <option value="before">Before Food</option>
  <option value="after">After Food</option>
</select>

<button onclick="addMedicine()" style="width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:10px;">
  Add Medicine
</button>

<hr>

<div id="container"></div>

<button class="reset-btn" onclick="resetAll()">Reset All</button>

<script>

let currentUser = "dad";

/* ---------- SWITCH USER ---------- */
function switchUser(user){
  currentUser = user;

  document.getElementById("dadBtn").classList.remove("active");
  document.getElementById("momBtn").classList.remove("active");
  document.getElementById(user+"Btn").classList.add("active");

  load();
}

/* ---------- ADD ---------- */
function addMedicine(){
  const name = document.getElementById("medName").value.trim();
  const time = document.getElementById("medTime").value.toLowerCase();
  const type = document.getElementById("medType").value;

  if(!name){
    alert("Enter medicine name");
    return;
  }

  db.ref(currentUser+"/medicines").push({
    name,
    time,
    type,
    taken:false
  });

  document.getElementById("medName").value="";
}

/* ---------- LOAD ---------- */
function load(){
  const ref = db.ref(currentUser+"/medicines");

  ref.off();

  ref.on("value",snap=>{
    const data = snap.val() || {};
    render(data);
  });
}

/* ---------- FORMAT ---------- */
function formatText(str){
  return str.charAt(0).toUpperCase() + str.slice(1);
}

/* ---------- RENDER ---------- */
function render(data){

  const container = document.getElementById("container");
  container.innerHTML = "";

  const layout = {
    morning:{before:[], after:[]},
    afternoon:{before:[], after:[]},
    night:{before:[], after:[]}
  };

  Object.entries(data).forEach(([key,m])=>{

    const time = m.time?.toLowerCase();

    if(!layout[time]) return; // safety

    layout[time][m.type].push({...m,key});
  });

  Object.entries(layout).forEach(([time,types])=>{

    const section = document.createElement("div");
    section.innerHTML = `<h2>${formatText(time)}</h2>`;

    ["before","after"].forEach(type=>{

      if(types[type].length === 0) return;

      const label = document.createElement("b");
      label.innerText = type === "before" ? "Before Food" : "After Food";
      section.appendChild(label);

      types[type].forEach(m=>{

        const btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = m.name;

        if(m.taken) btn.classList.add("taken");

        /* TOGGLE */
        btn.onclick = ()=>{
          db.ref(currentUser+"/medicines/"+m.key)
            .update({taken: !m.taken});
        };

        /* DELETE (long press / right click) */
        btn.oncontextmenu = (e)=>{
          e.preventDefault();
          if(confirm("Delete this medicine?")){
            db.ref(currentUser+"/medicines/"+m.key).remove();
          }
        };

        /* EDIT (double click) */
        btn.ondblclick = ()=>{
          const newName = prompt("Edit medicine name:", m.name);
          if(newName){
            db.ref(currentUser+"/medicines/"+m.key)
              .update({name:newName});
          }
        };

        section.appendChild(btn);
      });

    });

    container.appendChild(section);
  });
}

/* ---------- RESET ---------- */
function resetAll(){
  if(confirm("Reset all medicines?")){
    db.ref(currentUser+"/medicines").once("value",snap=>{
      snap.forEach(child=>{
        child.ref.update({taken:false});
      });
    });
  }
}

/* ---------- INIT ---------- */
switchUser("dad");

</script>

</body>
</html>
