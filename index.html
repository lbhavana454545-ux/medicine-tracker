<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px; }

h1 { text-align:center; }

/* TOP TABS */
.tabs {
  display:flex;
  justify-content:center;
  margin-bottom:15px;
}
.tabs button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ccc;
}
.activeTab {
  background:#2ecc71 !important;
  color:white;
}

/* USER TOGGLE */
.toggle { text-align:center; margin-bottom:15px; }
.toggle button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ccc;
}
.active { background:#2ecc71 !important; color:white; }

.btn {
  width:100%;
  padding:18px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#9e9e9e;
  color:white;
}
.taken { background:#2ecc71; }

.reset-btn {
  width:100%;
  padding:14px;
  margin-top:25px;
  border:none;
  border-radius:12px;
  background:#e74c3c;
  color:white;
}

/* FLOAT BUTTON */
.fab {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #3498db;
  color: white;
  font-size: 30px;
  border: none;
}

/* FORM */
.form {
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  padding:15px;
}

input { width:100%; padding:10px; margin-bottom:8px; }

/* TABLE */
table {
  width:100%;
  border-collapse: collapse;
  background:white;
}
th, td {
  padding:8px;
  border:1px solid #ddd;
  text-align:center;
}
</style>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "medicine-tracker-9acc2.firebaseapp.com",
  databaseURL: "https://medicine-tracker-9acc2-default-rtdb.firebaseio.com",
  projectId: "medicine-tracker-9acc2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<h1>Health Tracker</h1>

<!-- MAIN TABS -->
<div class="tabs">
  <button onclick="switchTab('med')" id="medTab">Medicines</button>
  <button onclick="switchTab('bp')" id="bpTab">BP</button>
</div>

<!-- USER -->
<div class="toggle">
  <button onclick="switchUser('dad')" id="dadBtn">Dad</button>
  <button onclick="switchUser('mom')" id="momBtn">Mom</button>
</div>

<!-- MEDICINES -->
<div id="medSection">
  <div id="container"></div>
  <button class="reset-btn" onclick="resetAll()">Reset All</button>
</div>

<!-- BP SECTION -->
<div id="bpSection" style="display:none;">

  <button onclick="toggleBPForm()" class="btn">+ Add BP</button>

  <div id="bpForm" class="form">
    <input id="systolic" placeholder="Systolic (upper)">
    <input id="diastolic" placeholder="Diastolic (lower)">
    <button onclick="saveBP()" class="btn">Save</button>
    <button onclick="toggleBPForm()" class="btn">Cancel</button>
  </div>

  <button onclick="copyTable()" class="btn">Copy Table</button>

  <table id="bpTable">
    <tr>
      <th>Time</th>
      <th>Systolic</th>
      <th>Diastolic</th>
    </tr>
  </table>

</div>

<script>

let currentUser="dad";

/* TAB SWITCH */
function switchTab(tab){
  document.getElementById("medSection").style.display = tab==="med"?"block":"none";
  document.getElementById("bpSection").style.display = tab==="bp"?"block":"none";

  document.getElementById("medTab").classList.toggle("activeTab",tab==="med");
  document.getElementById("bpTab").classList.toggle("activeTab",tab==="bp");

  if(tab==="bp") loadBP();
}

/* USER */
function switchUser(user){
  currentUser=user;
  document.getElementById("dadBtn").classList.remove("active");
  document.getElementById("momBtn").classList.remove("active");
  document.getElementById(user+"Btn").classList.add("active");

  load();
  loadBP();
}

/* ---------- MEDICINES (unchanged core) ---------- */
function load(){
  const ref=db.ref(currentUser+"/medicines");
  ref.off();
  ref.on("value",snap=>{
    const data=snap.val()||{};
    render(data);
  });
}

function render(data){
  const container=document.getElementById("container");
  container.innerHTML="";

  const layout={
    morning:{before:[],after:[]},
    afternoon:{before:[],after:[]},
    night:{before:[],after:[]}
  };

  Object.entries(data).forEach(([k,m])=>{
    const t=m.time?.toLowerCase();
    if(layout[t]) layout[t][m.type].push({...m,key:k});
  });

  Object.entries(layout).forEach(([time,types])=>{
    const section=document.createElement("div");
    section.innerHTML=`<h2>${time.charAt(0).toUpperCase()+time.slice(1)}</h2>`;

    ["before","after"].forEach(type=>{
      if(types[type].length===0) return;

      const label=document.createElement("b");
      label.innerText=type==="before"?"Before Food":"After Food";
      section.appendChild(label);

      types[type].forEach(m=>{
        const btn=document.createElement("button");
        btn.className="btn";
        btn.innerText=m.name;
        if(m.taken) btn.classList.add("taken");

        btn.onclick=()=>{
          db.ref(currentUser+"/medicines/"+m.key).update({taken:!m.taken});
        };

        btn.oncontextmenu=(e)=>{
          e.preventDefault();
          if(confirm("Delete?")){
            db.ref(currentUser+"/medicines/"+m.key).remove();
          }
        };

        section.appendChild(btn);
      });
    });

    container.appendChild(section);
  });
}

function resetAll(){
  db.ref(currentUser+"/medicines").once("value",snap=>{
    snap.forEach(c=>c.ref.update({taken:false}));
  });
}

/* ---------- BP ---------- */

function toggleBPForm(){
  const f=document.getElementById("bpForm");
  f.style.display=f.style.display==="block"?"none":"block";
}

function saveBP(){
  const s=document.getElementById("systolic").value;
  const d=document.getElementById("diastolic").value;

  if(!s||!d) return alert("Enter values");

  db.ref(currentUser+"/bp").push({
    systolic:s,
    diastolic:d,
    time: new Date().toLocaleString(),
    timestamp: Date.now()
  });

  toggleBPForm();
}

function loadBP(){
  const ref=db.ref(currentUser+"/bp");
  ref.off();

  ref.on("value",snap=>{
    const data=snap.val()||{};
    renderBP(data);
  });
}

function renderBP(data){
  const table=document.getElementById("bpTable");
  table.innerHTML=`
    <tr>
      <th>Time</th>
      <th>Systolic</th>
      <th>Diastolic</th>
    </tr>`;

  Object.values(data).forEach(m=>{
    const row=table.insertRow();
    row.insertCell(0).innerText=m.time;
    row.insertCell(1).innerText=m.systolic;
    row.insertCell(2).innerText=m.diastolic;
  });
}

function copyTable(){
  let text="Time\tSystolic\tDiastolic\n";
  const rows=document.querySelectorAll("#bpTable tr");

  rows.forEach((r,i)=>{
    if(i===0) return;
    const cols=r.querySelectorAll("td");
    text+=`${cols[0].innerText}\t${cols[1].innerText}\t${cols[2].innerText}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

/* INIT */
switchTab("med");
switchUser("dad");

</script>

</body>
</html>
