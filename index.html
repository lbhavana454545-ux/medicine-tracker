<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad's Medicines</title>
<button onclick="resetAll()" style="margin:10px;padding:10px;">
  Reset All (Testing)
</button>
<style>
  body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    padding: 10px;
  }

  h1 {
    text-align: center;
  }

  h2 {
    margin-top: 20px;
  }
 
  .section {
    margin-bottom: 15px;
  }

  .btn {
    width: 100%;
    padding: 18px;
    margin: 8px 0;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #9e9e9e;
    color: white;
  }

  .taken {
    background: #2ecc71;
  }

  .info {
    text-align: center;
    font-size: 14px;
    color: #555;
  }
</style>
</head>

<body>

<h1>Dad's Medicines</h1>
<div class="info" id="statusText"></div>

<!-- MORNING -->
<div class="section">
  <h2>Morning</h2>

  <b>Before Food</b>
  <button class="btn" id="m1">Pan D</button>
  <button class="btn" id="m2">Zavetox</button>
  <button class="btn" id="m3">Fiasp Insulin</button>

  <b>After Food</b>
  <button class="btn" id="m4">Cilacar 10mg</button>
  <button class="btn" id="m5">Omnacortil 5mg</button>
  <button class="btn" id="m6">Nodosis 1g</button>
</div>

<!-- AFTERNOON -->
<div class="section">
  <h2>Afternoon</h2>

  <b>Before Food</b>
  <button class="btn" id="a1">Fiasp Insulin</button>

  <b>After Food</b>
  <button class="btn" id="a2">Calci-CZ</button>
  <button class="btn" id="a3">Silodal D8</button>
  <button class="btn" id="a4">Moxovas</button>
</div>

<!-- NIGHT -->
<div class="section">
  <h2>Night</h2>

  <b>Before Food</b>
  <button class="btn" id="n1">Fiasp Insulin</button>
  <button class="btn" id="n2">Zavetox</button>

  <b>After Food</b>
  <button class="btn" id="n3">Azoran 100mg</button>
  <button class="btn" id="n4">Cilacar 20mg</button>
  <button class="btn" id="n5">Ecosprin AV</button>
  <button class="btn" id="n6">Nodosis</button>
  <button class="btn" id="n7">Tresiba Insulin</button>
</div>

<script>
const meds = [
"m1","m2","m3","m4","m5","m6",
"a1","a2","a3","a4",
"n1","n2","n3","n4","n5","n6","n7"
];

function getTodayKey() {
  const now = new Date();
  let adjusted = new Date();

  if (now.getHours() < 3) {
    adjusted.setDate(adjusted.getDate() - 1);
  }

  return adjusted.toDateString();
}

function resetIfNeeded() {
  const today = getTodayKey();
  const lastReset = localStorage.getItem("lastReset");

  if (lastReset !== today) {
    localStorage.clear();
    localStorage.setItem("lastReset", today);
  }

  document.getElementById("statusText").innerText =
    "Tracking for: " + today;
}

function loadState() {
  meds.forEach(id => {
    const btn = document.getElementById(id);

    if (localStorage.getItem(id) === "taken") {
      btn.classList.add("taken");
    }

    btn.onclick = () => {
      localStorage.setItem(id, "taken");
      btn.classList.add("taken");
    };
  });
}

resetIfNeeded();
loadState();
</script>

</body>
</html>
