<!DOCTYPE html>
<html>
<head>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad's Medicines</title>

<style>
  body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
    padding: 10px;
  }

  h1 { text-align: center; }
  h2 { margin-top: 20px; }

  .section { margin-bottom: 15px; }

  .btn {
    width: 100%;
    padding: 18px;
    margin: 8px 0;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #9e9e9e;
    color: white;
  }

  .taken { background: #2ecc71; }

  .info {
    text-align: center;
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
  }

  .reset-btn {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    border: none;
    border-radius: 12px;
    background: #e74c3c;
    color: white;
    font-size: 16px;
  }
</style>

<!--Firebase CONFIG -->
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "medicine-tracker-9acc2.firebaseapp.com",
  databaseURL: "https://medicine-tracker-9acc2-default-rtdb.firebaseio.com",
  projectId: "medicine-tracker-9acc2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<h1>Dad's Medicines</h1>
<div class="info" id="statusText"></div>

<!-- MORNING -->
<div class="section">
  <h2>Morning</h2>

  <b>Before Food</b>
  <button class="btn" id="m1">Pan D</button>
  <button class="btn" id="m2">Zavetox</button>
  <button class="btn" id="m3">Fiasp Insulin</button>

  <b>After Food</b>
  <button class="btn" id="m4">Cilacar 10mg</button>
  <button class="btn" id="m5">Omnacortil 5mg</button>
  <button class="btn" id="m6">Nodosis 1g</button>
</div>

<!-- AFTERNOON -->
<div class="section">
  <h2>Afternoon</h2>

  <b>Before Food</b>
  <button class="btn" id="a1">Fiasp Insulin</button>

  <b>After Food</b>
  <button class="btn" id="a2">Calci-CZ</button>
  <button class="btn" id="a3">Silodal D8</button>
  <button class="btn" id="a4">Moxovas</button>
</div>

<!-- NIGHT -->
<div class="section">
  <h2>Night</h2>

  <b>Before Food</b>
  <button class="btn" id="n1">Fiasp Insulin</button>
  <button class="btn" id="n2">Zavetox</button>

  <b>After Food</b>
  <button class="btn" id="n3">Azoran 100mg</button>
  <button class="btn" id="n4">Cilacar 20mg</button>
  <button class="btn" id="n5">Ecosprin AV</button>
  <button class="btn" id="n6">Nodosis</button>
  <button class="btn" id="n7">Tresiba Insulin</button>
</div>

<button class="reset-btn" onclick="confirmReset()">Reset All</button>

<script>

const meds = [
"m1","m2","m3","m4","m5","m6",
"a1","a2","a3","a4",
"n1","n2","n3","n4","n5","n6","n7"
];

function getTodayKey() {
  const now = new Date();
  let adjusted = new Date();

  if (now.getHours() < 3) {
    adjusted.setDate(adjusted.getDate() - 1);
  }

  return adjusted.toDateString();
}

function confirmReset() {
  if (confirm("Are you sure you want to reset all medicines?")) {
    meds.forEach(id => {
      db.ref("dad/" + id).set(false);
    });
  }
}

function resetIfNeeded() {
  const today = getTodayKey();
  document.getElementById("statusText").innerText =
    "Tracking for: " + today + " (resets after 3 AM)";
}

function loadState() {
  meds.forEach(id => {
    const btn = document.getElementById(id);
    const ref = db.ref("dad/" + id);

    ref.on("value", snapshot => {
      if (snapshot.val() === true) {
        btn.classList.add("taken");
      } else {
        btn.classList.remove("taken");
      }
    });

    btn.onclick = () => {
      ref.once("value").then(snapshot => {
        ref.set(!snapshot.val());
      });
    };
  });
}

resetIfNeeded();
loadState();

</script>

</body>
</html>
